; M5StickT Thermal Camera with WiFi + RTSP
; Board: M5StickC (same ESP32 + AXP192 hardware as M5StickT)
;
; First-time WiFi setup:
;   1. Copy wifi.cfg.sample -> data/wifi.cfg and fill in credentials
;   2. pio run -t uploadfs   (uploads LittleFS filesystem image)
;   3. pio run -t upload     (uploads firmware)

[env:m5stickt]
platform = espressif32
board = m5stick-c
framework = arduino

monitor_speed = 115200
upload_speed = 1500000

; LittleFS for wifi.cfg storage
board_build.filesystem = littlefs

; All local library source is in lib/M5StickT automatically
; Do NOT add TFT_eSPI as a lib_dep — In_eSPI is the bundled equivalent
lib_deps =
    ; (none needed — M5StickT library is in lib/ and WiFi/LittleFS are in the ESP32 framework)

build_flags =
    -DCORE_DEBUG_LEVEL=0

[env:m5stickt_debug]
extends = env:m5stickt
build_flags =
    -DCORE_DEBUG_LEVEL=3
